baseURL = "https://context.lat/"
languageCode = "ru"
title = "context.lat — Каталог AI-инструментов"

enableRobotsTXT = true
enableGitInfo = true

[frontmatter]
  # Priority: manual lastmod in front matter > git commit date > date field.
  lastmod = ["lastmod", ":git", "date"]

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[taxonomies]
  tag = "tags"

[related]
  threshold = 80
  includeNewer = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10

[params]
  description = "Справочник AI-инструментов для вайбкодеров и их ии-агентов: модели, IDE, skills, статьи, MCP серверы"
  author = "context.lat"
  ogImage = "https://context.lat/og-image.png?v=2"
  gitRepo = "https://github.com/serejaris/context.lat"
